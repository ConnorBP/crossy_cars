<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Roady Car</title>
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        background: #111;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
      }
      canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      .loading {
        position: fixed;
        z-index: 10;
        inset: 0;
        display: grid;
        place-content: center;
        justify-items: center;
        gap: 0.8rem;
        box-sizing: border-box;
        padding: calc(1rem + env(safe-area-inset-top))
          calc(1rem + env(safe-area-inset-right))
          calc(1rem + env(safe-area-inset-bottom))
          calc(1rem + env(safe-area-inset-left));
        color: #fff;
        background: #111;
        font: 600 1rem/1.4 system-ui, sans-serif;
        letter-spacing: 0.03em;
        pointer-events: none;
        transition: opacity 180ms ease-out;
      }
      .loading.is-hidden {
        opacity: 0;
      }
      .loading[hidden] {
        display: none;
      }
      .spinner {
        width: 2rem;
        height: 2rem;
        box-sizing: border-box;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 800ms linear infinite;
      }
      .noscript {
        position: fixed;
        z-index: 20;
        inset: 0;
        display: grid;
        place-content: center;
        box-sizing: border-box;
        padding: calc(1rem + env(safe-area-inset-top))
          calc(1rem + env(safe-area-inset-right))
          calc(1rem + env(safe-area-inset-bottom))
          calc(1rem + env(safe-area-inset-left));
        color: #fff;
        background: #111;
        text-align: center;
        font: 600 1rem/1.5 system-ui, sans-serif;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .loading { transition: none; }
        .spinner { animation: none; }
      }
    </style>
    <!--
      Web-audio gesture unlock (must run BEFORE the wasm-bindgen module).
      Chrome blocks AudioContext.resume() until a user gesture happens on the
      page. bevy_audio -> rodio -> cpal constructs the AudioContext and calls
      resume() at startup (no gesture yet), so the context is left suspended
      and ALL game audio stays silent for the session, even after pressing keys.
      The wasm-bindgen JS captures `window.AudioContext` once, at module-eval
      time, into a const. This classic (non-module) script runs before that
      module evaluates, so wrapping the global constructor here lets us record
      every context cpal creates and resume them synchronously inside the first
      keydown/pointerdown handler (a real user-gesture call stack).
    -->
    <script>
      (function () {
        if (typeof window === "undefined") return;
        var NativeAC = window.AudioContext || window.webkitAudioContext;
        if (!NativeAC) return;
        var contexts = [];
        function PatchedAC(opts) {
          var ctx = new NativeAC(opts);
          try { contexts.push(ctx); } catch (e) {}
          return ctx; // an explicitly-returned object replaces `this` under `new`
        }
        PatchedAC.prototype = NativeAC.prototype;
        window.AudioContext = PatchedAC;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedAC;
        function resumeAll() {
          for (var i = 0; i < contexts.length; i++) {
            try {
              if (contexts[i].state !== "running") contexts[i].resume();
            } catch (e) {}
          }
        }
        ["keydown", "pointerdown", "mousedown", "touchstart", "click"].forEach(function (ev) {
          window.addEventListener(ev, resumeAll, { capture: true });
        });
      })();
    </script>
  </head>
  <body>
    <div id="loading" class="loading" role="status" aria-live="polite" aria-atomic="true" hidden>
      <span class="spinner" aria-hidden="true"></span>
      <span>Loading Roady Car&hellip;</span>
    </div>
    <noscript>
      <div class="noscript">Roady Car needs JavaScript and WebAssembly enabled to run.</div>
    </noscript>

    <link data-trunk rel="rust" data-bin="car_game_ai" />
    <script>
      (function () {
        var loading = document.getElementById("loading");
        if (!loading) return;
        loading.hidden = false;
        var finished = false;
        function hideLoading() {
          if (finished) return;
          finished = true;
          loading.setAttribute("aria-hidden", "true");
          loading.classList.add("is-hidden");
          window.setTimeout(function () { loading.hidden = true; }, 200);
          observer.disconnect();
        }
        function canvasReady() {
          if (!document.querySelector("canvas")) return false;
          window.requestAnimationFrame(function () {
            window.requestAnimationFrame(hideLoading);
          });
          return true;
        }
        var observer = new MutationObserver(canvasReady);
        if (!canvasReady()) {
          observer.observe(document.documentElement, { childList: true, subtree: true });
        }
        ["keydown", "pointerdown", "touchstart"].forEach(function (eventName) {
          window.addEventListener(eventName, hideLoading, { capture: true, once: true });
        });
        // Never leave a failed or unusually slow boot obscuring the page forever.
        window.setTimeout(hideLoading, 15000);
      })();
    </script>
  </body>
</html>
