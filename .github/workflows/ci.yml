name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Rust tests and production release
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      CARGO_TERM_COLOR: always
      TRUNK_VERSION: 0.21.14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust and wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libasound2-dev libudev-dev libwayland-dev pkg-config

      - name: Cache Trunk
        id: trunk-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trunk
          key: ${{ runner.os }}-trunk-${{ env.TRUNK_VERSION }}

      - name: Install locked Trunk
        if: steps.trunk-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: cargo install --locked trunk --version "$TRUNK_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check formatting
        timeout-minutes: 3
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        timeout-minutes: 30
        run: cargo test --locked

      - name: Check WebAssembly target
        timeout-minutes: 20
        run: cargo check --locked --target wasm32-unknown-unknown

      - name: Build production WebAssembly release
        timeout-minutes: 25
        run: trunk build --release --cargo-profile wasm-release

      - name: Validate release output
        timeout-minutes: 3
        run: python tools/check_release.py

      - name: Upload production release
        uses: actions/upload-artifact@v4
        with:
          name: web-release-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  browser-qa:
    name: Browser QA (${{ matrix.suite }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        suite: [audit, desktop, touch, settings]
    env:
      BROWSER_CHANNEL: chromium
      PLAYWRIGHT_VERSION: 1.52.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download production release
        uses: actions/download-artifact@v4
        with:
          name: web-release-${{ github.sha }}
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-chromium

      - name: Install Python Playwright and Chromium
        timeout-minutes: 10
        run: |
          python -m pip install --disable-pip-version-check "playwright==$PLAYWRIGHT_VERSION"
          python -m playwright install --with-deps chromium

      - name: Run strict ${{ matrix.suite }} browser QA
        timeout-minutes: 35
        shell: bash
        run: |
          set -euo pipefail
          python -m http.server 8080 --bind 127.0.0.1 --directory dist > /tmp/roady-car-server.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT INT TERM

          ready=0
          for attempt in $(seq 1 60); do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "Static server exited before it became ready" >&2
              cat /tmp/roady-car-server.log >&2
              exit 1
            fi
            if curl --fail --silent --show-error http://127.0.0.1:8080/ >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "Timed out waiting for the release server" >&2
            cat /tmp/roady-car-server.log >&2
            exit 1
          fi

          case "${{ matrix.suite }}" in
            audit)
              python tools/browser_audit.py \
                http://127.0.0.1:8080 \
                --browser-channel chromium
              python tools/browser_turnstile_bridge.py \
                --browser-channel chromium
              ;;
            desktop)
              python tools/browser_scenarios.py \
                --url http://127.0.0.1:8080 \
                --browser-channel chromium \
                --out-dir tools/scenarios/desktop
              ;;
            touch)
              python tools/browser_touch_scenarios.py \
                --url http://127.0.0.1:8080 \
                --browser-channel chromium \
                --out-dir tools/scenarios/touch
              ;;
            settings)
              python tools/browser_settings_scenarios.py \
                --url http://127.0.0.1:8080 \
                --browser-channel chromium \
                --out-dir tools/scenarios/settings
              ;;
            *)
              echo "Unknown browser QA suite: ${{ matrix.suite }}" >&2
              exit 2
              ;;
          esac

      - name: Upload browser screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-${{ matrix.suite }}-${{ github.sha }}
          path: tools/scenarios/
          if-no-files-found: ignore
          retention-days: 7
