name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-qa:
    name: Rust, release, and browser QA
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      BROWSER_CHANNEL: chromium
      TRUNK_VERSION: 0.21.14
      PLAYWRIGHT_VERSION: 1.52.0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust and wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libasound2-dev libudev-dev pkg-config

      - name: Cache Trunk
        id: trunk-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/trunk
          key: ${{ runner.os }}-trunk-${{ env.TRUNK_VERSION }}

      - name: Install locked Trunk
        if: steps.trunk-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: cargo install --locked trunk --version "$TRUNK_VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-chromium

      - name: Install Python Playwright and Chromium
        timeout-minutes: 10
        run: |
          python -m pip install --disable-pip-version-check "playwright==$PLAYWRIGHT_VERSION"
          python -m playwright install --with-deps chromium

      - name: Check formatting
        timeout-minutes: 3
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        timeout-minutes: 15
        run: cargo test --locked

      - name: Check WebAssembly target
        timeout-minutes: 15
        run: cargo check --locked --target wasm32-unknown-unknown

      - name: Build production WebAssembly release
        timeout-minutes: 20
        run: trunk build --release --cargo-profile wasm-release

      - name: Validate release output
        timeout-minutes: 3
        run: python tools/check_release.py

      - name: Run strict browser audit and scenarios
        timeout-minutes: 8
        shell: bash
        run: |
          set -uo pipefail
          python -m http.server 8080 --bind 127.0.0.1 --directory dist > /tmp/roady-car-server.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT INT TERM

          ready=0
          for attempt in $(seq 1 60); do
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "Static server exited before it became ready" >&2
              cat /tmp/roady-car-server.log >&2
              exit 1
            fi
            if curl --fail --silent --show-error http://127.0.0.1:8080/ >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "Timed out waiting for the release server" >&2
            cat /tmp/roady-car-server.log >&2
            exit 1
          fi

          audit_status=0
          scenario_status=0
          python tools/browser_audit.py http://127.0.0.1:8080 --browser-channel chromium || audit_status=$?
          python tools/browser_scenarios.py \
            --url http://127.0.0.1:8080 \
            --browser-channel chromium \
            --out-dir tools/scenarios/desktop || scenario_status=$?
          touch_status=0
          python tools/browser_touch_scenarios.py \
            --url http://127.0.0.1:8080 \
            --browser-channel chromium \
            --out-dir tools/scenarios/touch || touch_status=$?

          if [ "$audit_status" -ne 0 ] || [ "$scenario_status" -ne 0 ] || [ "$touch_status" -ne 0 ]; then
            echo "Browser QA failed (audit=$audit_status, desktop=$scenario_status, touch=$touch_status)" >&2
            cat /tmp/roady-car-server.log >&2
            exit 1
          fi

      - name: Upload production release
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-release-${{ github.sha }}
          path: dist/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload browser screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-scenarios-${{ github.sha }}
          path: tools/scenarios/
          if-no-files-found: ignore
          retention-days: 7
