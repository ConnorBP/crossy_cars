name: Deploy Cloudflare Leaderboard Worker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      tested_commit_sha:
        description: Full commit SHA from a successful CI run
        required: true
        type: string
      ci_run_id:
        description: Successful CI workflow run ID containing web-release-<SHA>
        required: true
        type: string
      enable_ranked:
        description: "Guarded rollout: only the exact lowercase value true requests enablement"
        required: true
        default: "false"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: cloudflare-leaderboard-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    env:
      TESTED_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.tested_commit_sha }}
      CI_RUN_ID: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.ci_run_id }}
      ENABLE_RANKED: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_ranked || 'false' }}
      LEADERBOARD_BASE_URL: ${{ vars.LEADERBOARD_BASE_URL }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      LB_SESSION_HMAC_KEY: ${{ secrets.LB_SESSION_HMAC_KEY }}
      LB_IP_HASH_PEPPER: ${{ secrets.LB_IP_HASH_PEPPER }}
      LB_ADMIN_TOKEN: ${{ secrets.LB_ADMIN_TOKEN }}
      LB_TURNSTILE_SECRET: ${{ secrets.LB_TURNSTILE_SECRET }}
      LB_CLIENT_HMAC_KEY: ${{ secrets.ROADY_LEADERBOARD_CLIENT_HMAC_KEY }}
      LB_V3_PROOF_HMAC_KEY: ${{ secrets.LB_V3_PROOF_HMAC_KEY }}
      LB_V3_SEED_ENCRYPTION_KEY: ${{ secrets.LB_V3_SEED_ENCRYPTION_KEY }}
      LB_V3_SEED_KEY_ID: ${{ secrets.LB_V3_SEED_KEY_ID }}
      LB_V3_EVIDENCE_CAPABILITY_KEY: ${{ secrets.LB_V3_EVIDENCE_CAPABILITY_KEY }}
      LB_V3_CLIENT_HMAC_KEYS_JSON: ${{ secrets.LB_V3_CLIENT_HMAC_KEYS_JSON }}
    steps:
      - name: Validate dispatch and tested CI provenance
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          [[ "$TESTED_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::tested_commit_sha must be a full SHA"; exit 1; }
          [[ "$CI_RUN_ID" =~ ^[0-9]+$ ]] || { echo "::error::ci_run_id must be numeric"; exit 1; }
          if [ "$ENABLE_RANKED" != false ] && [ "$ENABLE_RANKED" != true ]; then
            echo "::error::enable_ranked accepts only exact lowercase false or true"; exit 1
          fi
          run_json=$(gh api "repos/$REPOSITORY/actions/runs/$CI_RUN_ID")
          test "$(jq -r .name <<<"$run_json")" = CI
          test "$(jq -r .conclusion <<<"$run_json")" = success
          test "$(jq -r .head_sha <<<"$run_json")" = "$TESTED_SHA"
          test "$(jq -r .head_branch <<<"$run_json")" = master
          artifacts=$(gh api "repos/$REPOSITORY/actions/runs/$CI_RUN_ID/artifacts")
          jq -e --arg name "web-release-$TESTED_SHA" '.artifacts[] | select(.name==$name and .expired==false)' <<<"$artifacts" >/dev/null
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TESTED_SHA }}
          fetch-depth: 0
      - name: Confirm checkout is the tested commit
        run: test "$(git rev-parse HEAD)" = "$TESTED_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: leaderboard/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies and rerun Worker gates
        working-directory: leaderboard
        run: |
          npm ci
          npm run test:ci
      - name: Download and verify CI artifact hashes for the tested SHA
        uses: actions/download-artifact@v4
        with:
          name: web-release-${{ env.TESTED_SHA }}
          path: ci-release
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ env.CI_RUN_ID }}
      - name: Match source and release artifact hashes
        run: |
          set -euo pipefail
          sha256sum --check ci-release/v3-artifacts.sha256
          (cd ci-release && sha256sum --check release-artifacts.sha256)
          python tools/check_release.py --dist ci-release/dist
      - name: Require all credentials without printing values
        run: |
          set -euo pipefail
          missing=0
          require() { if [ -z "${!1:-}" ]; then echo "::error::missing credential or variable: $1"; missing=1; fi; }
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_D1_DATABASE_ID LEADERBOARD_BASE_URL \
            LB_SESSION_HMAC_KEY LB_IP_HASH_PEPPER LB_ADMIN_TOKEN LB_TURNSTILE_SECRET LB_CLIENT_HMAC_KEY \
            LB_V3_PROOF_HMAC_KEY LB_V3_SEED_ENCRYPTION_KEY LB_V3_SEED_KEY_ID \
            LB_V3_EVIDENCE_CAPABILITY_KEY LB_V3_CLIENT_HMAC_KEYS_JSON; do require "$name"; done
          [ "$CLOUDFLARE_D1_DATABASE_ID" != 00000000-0000-0000-0000-000000000000 ] || { echo "::error::placeholder D1 id"; missing=1; }
          [ "$missing" = 0 ] || { echo "::error::deployment remains disabled; see DEPLOYMENT.md"; exit 1; }
      - name: Inject tested SHA and D1 id; force first deployment disabled
        working-directory: leaderboard
        run: |
          sed -i "s/00000000-0000-0000-0000-000000000000/$CLOUDFLARE_D1_DATABASE_ID/" wrangler.toml
          sed -i "s/BUILD = \"dev\"/BUILD = \"$TESTED_SHA\"/" wrangler.toml
          grep -q 'ROADY_V3_RANKED_ENABLED = "false"' wrangler.toml
      - name: Apply ordered additive migrations
        working-directory: leaderboard
        run: printf 'y\n' | npx wrangler@4 d1 migrations apply roady_leaderboard --remote
      - name: Verify exact remote v3 migration registry and schema
        working-directory: leaderboard
        run: |
          EXPECTED_MIGRATION_SHA256=$(sha256sum migrations/0006_ranked_v3.sql | cut -d' ' -f1)
          export EXPECTED_MIGRATION_SHA256
          node scripts/verify-remote-v3.mjs | tee ../remote-v3-evidence.json
      - name: Install all runtime secrets and deploy Worker disabled
        working-directory: leaderboard
        run: |
          set -euo pipefail
          put() { printf '%s' "${!1}" | npx wrangler@4 secret put "$1" >/dev/null; echo "installed $1"; }
          for name in LB_SESSION_HMAC_KEY LB_IP_HASH_PEPPER LB_ADMIN_TOKEN LB_TURNSTILE_SECRET LB_CLIENT_HMAC_KEY \
            LB_V3_PROOF_HMAC_KEY LB_V3_SEED_ENCRYPTION_KEY LB_V3_SEED_KEY_ID \
            LB_V3_EVIDENCE_CAPABILITY_KEY LB_V3_CLIENT_HMAC_KEYS_JSON; do put "$name"; done
          npx wrangler@4 deploy
      - name: Two uncached exact disabled probes plus legacy health/board
        working-directory: leaderboard
        env:
          EXPECTED_COMMIT_SHA: ${{ env.TESTED_SHA }}
        run: npm run verify:production:disabled
      - name: Refuse guarded enable unless the committed parity latch is approved
        if: env.ENABLE_RANKED == 'true'
        run: |
          grep -q 'const PRODUCTION_PARITY_PROVEN = true' leaderboard/src/v3.ts || {
            echo "::error::production parity latch is still false; effective capability and issuance remain disabled"; exit 1;
          }
      - name: Guarded exact-lowercase true rollout
        if: env.ENABLE_RANKED == 'true'
        working-directory: leaderboard
        run: |
          set -euo pipefail
          # Every prior source/CI hash, Worker, workerd, D1, migration and two-probe
          # check is a hard dependency of this step. The committed default stays false.
          rollback=1
          rollback_on_failure() {
            if [ "$rollback" = 1 ]; then
              echo "::error::enable verification failed; disabling issuance first"
              sed -i 's/ROADY_V3_RANKED_ENABLED = "true"/ROADY_V3_RANKED_ENABLED = "false"/' wrangler.toml
              npx wrangler@4 deploy || echo "::error::ROLLBACK COMMAND FAILED: cd leaderboard && npx wrangler@4 deploy"
            fi
          }
          trap rollback_on_failure EXIT
          sed -i 's/ROADY_V3_RANKED_ENABLED = "false"/ROADY_V3_RANKED_ENABLED = "true"/' wrangler.toml
          test "$(grep -c 'ROADY_V3_RANKED_ENABLED = \"true\"' wrangler.toml)" = 1
          npx wrangler@4 deploy
          EXPECTED_COMMIT_SHA="$TESTED_SHA" npm run verify:production:enabled
          rollback=0
      - name: Write machine-readable deployment evidence
        if: always()
        run: |
          jq -n --arg sha "$TESTED_SHA" --arg ciRun "$CI_RUN_ID" --arg enable "$ENABLE_RANKED" \
            --arg conclusion "${{ job.status }}" --arg workflowRun "${{ github.run_id }}" \
            '{schema:"roady.production-gates.v1",testedCommitSha:$sha,ciRunId:$ciRun,enableRequested:($enable=="true"),workflowRunId:$workflowRun,conclusion:$conclusion,defaultWorkerFlag:"false"}' > production-gate-evidence.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: worker-production-evidence-${{ env.TESTED_SHA }}-${{ github.run_id }}
          path: |
            production-gate-evidence.json
            remote-v3-evidence.json
          if-no-files-found: ignore
          retention-days: 90
